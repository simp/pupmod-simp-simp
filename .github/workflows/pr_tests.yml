# Run Puppet checks and test matrix on Pull Requests
# ------------------------------------------------------------------------------
#             NOTICE: **This file is maintained with puppetsync**
#
# This file is updated automatically as part of a puppet module baseline.
#
# The next baseline sync will overwrite any local changes to this file!
#
# ==============================================================================
#
# https://docs.github.com/en/actions/reference/events-that-trigger-workflows
#
---
name: PR Tests
'on':
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  puppet-syntax:
    name: 'Puppet Syntax'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Install Ruby 3.2"
        uses: ruby/setup-ruby@v1  # ruby/setup-ruby@ec106b438a1ff6ff109590de34ddc62c540232e0
        with:
          ruby-version: 3.2.11
          bundler-cache: true
      - run: "bundle exec rake syntax"

  puppet-style:
    name: 'Puppet Style'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Install Ruby 3.2"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.11
          bundler-cache: true
      - run: "bundle exec rake lint"
      - run: "bundle exec rake metadata_lint"

  ruby-style:
    name: 'Ruby Style'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: "Install Ruby 3.4"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.9
          bundler-cache: true
      - run: |
          bundle show
          bundle exec rake rubocop

  file-checks:
    name: 'File checks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 'Install Ruby 3.4'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.9
          bundler-cache: true
      - run: bundle exec rake check:dot_underscore
      - run: bundle exec rake check:test_file

  releng-checks:
    name: 'RELENG checks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 'Install Ruby 3.4'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.9
          bundler-cache: true
      - name: 'Tags and changelogs'
        run: |
          bundle exec rake pkg:check_version
          bundle exec rake pkg:compare_latest_tag[,true]
          bundle exec rake pkg:create_tag_changelog
      - name: 'Test-build the Puppet module'
        run: 'bundle exec pdk build --force'

  spec-tests:
    name: 'Spec (${{matrix.test_suite.label}}, ${{matrix.puppet.label}})'
    needs: [puppet-syntax]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        puppet:
          - label: 'Puppet 8.x'
            puppet_version: '~> 8.0'
            ruby_version: '3.2'
            experimental: false
        test_suite:
          - label: classes 01
            run: bundle exec rspec spec/classes/01_classes
          - label: classes 10
            run: bundle exec rspec spec/classes/10_classes
          - label: classes 20
            run: bundle exec rspec spec/classes/20_classes
          - label: classes 00
            run: bundle exec rspec spec/classes/00_classes
          - label: facter
            run: bundle exec rspec spec/facter
          - label: functions
            run: bundle exec rspec spec/functions
          - label: aliases
            run: bundle exec rspec spec/type_aliases
      fail-fast: false
    env:
      PUPPET_VERSION: ${{matrix.puppet.puppet_version}}
    steps:
      - uses: actions/checkout@v6
      - name: 'Install Ruby ${{matrix.puppet.ruby_version}}'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{matrix.puppet.ruby_version}}
          bundler-cache: true
      - run: 'command -v rpm || if command -v apt-get; then sudo apt-get update; sudo apt-get install -y rpm; fi ||:'
      - run: 'bundle exec rake spec_prep'
      - run: ${{matrix.test_suite.run}}
        continue-on-error: ${{matrix.puppet.experimental}}

  acceptance:
    runs-on:
      - ubuntu-latest
    strategy:
      matrix:
        node:
          - almalinux8
          - almalinux9
          - almalinux10
        suite:
          - default
          - base_apps
      fail-fast: false
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      - name: setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.9
      - name: bundle install
        run: |
          bundle install
      - name: Setup libvirt for Vagrant
        run: |
          sudo add-apt-repository ppa:evgeni/vagrant
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends vagrant vagrant-libvirt libvirt-daemon-system libvirt-daemon qemu-system-x86 qemu-utils dnsmasq
          sudo chmod 666 /var/run/libvirt/libvirt-sock
      - name: beaker
        env:
          BEAKER_HYPERVISOR: 'vagrant_libvirt'
          VAGRANT_DEFAULT_PROVIDER: 'libvirt'
        run: |
          bundle exec rake beaker:suites[${{ matrix.suite}},${{ matrix.node }}]
