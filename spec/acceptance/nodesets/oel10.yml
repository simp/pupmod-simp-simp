---
HOSTS:
  server-oel10.simp.beaker:
    roles:
    - server
    - default
    - master
    - simp_server
    - el10
    platform: el-10-x86_64
    box: oraclelinux/10
    box_url: https://oracle.github.io/vagrant-projects/boxes/oraclelinux/10.json
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
    family: sicura-image-build/oracle-linux-10
    gce_machine_type: n1-standard-2
CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: <%= ENV.fetch('BEAKER_PUPPET_COLLECTION', '~') %>
