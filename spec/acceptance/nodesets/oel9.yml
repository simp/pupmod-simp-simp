---
HOSTS:
  server-oel9.simp.beaker:
    roles:
    - server
    - default
    - master
    - simp_server
    - el9
    platform: el-9-x86_64
    box: generic/oracle9
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
    family: sicura-image-build/oracle-linux-9
    gce_machine_type: n1-standard-2
CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: <%= ENV.fetch('BEAKER_PUPPET_COLLECTION', '~') %>
